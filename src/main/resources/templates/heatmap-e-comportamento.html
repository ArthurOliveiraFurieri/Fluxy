<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Heatmaps e Comportamento - SEBRAE</title>
    <link rel="stylesheet" th:href="@{/css/heatmap-comportamento.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-card">
    <div class="header-row">
        <div>
            <h1 th:text="${pageTitle}">Heatmaps e Comportamento</h1>
            <p th:text="${pageSubtitle}">Análise detalhada de cliques e profundidade de scroll</p>
        </div>
        <div class="date-badge">📅 Últimos 07 dias</div>
    </div>

    <div class="tabs">
        <button class="tab-btn tab-active">Mapas de Cliques</button>
        <button class="tab-btn">Profundidade de Scroll</button>
    </div>

    <div class="heatmap-container">
        <div class="heatmap-header">
            <span class="status-dot"></span>
            <strong>Mapa de Calor - Página Inicial SEBRAE</strong>
        </div>

        <div class="grid-row">
            <div class="row-label">Navegação</div>
            <div class="blocks-area">
                <div class="block"
                     th:each="bloco : ${blocosNavegacao}"
                     th:classappend="${bloco.intensidade}"
                     th:text="${bloco.nome}">
                </div>
            </div>
        </div>

        <div class="grid-row">
            <div class="row-label">Hero</div>
            <div class="blocks-area">
                <div class="block"
                     th:each="bloco : ${blocosHero}"
                     th:classappend="${bloco.intensidade}"
                     th:text="${bloco.nome}">
                </div>
            </div>
        </div>

        <div class="grid-row">
            <div class="row-label">Acesso Rápido</div>
            <div class="blocks-area">
                <div class="block"
                     th:each="bloco : ${blocosAcessoRapido}"
                     th:classappend="${bloco.intensidade}"
                     th:text="${bloco.nome}">
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-section">

        <div class="sub-card">
            <div class="card-header-group">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
                <h3>Elementos Mais Clicados</h3>
            </div>

            <div class="ranking-list">
                <div class="bar-row" th:each="elemento : ${elementosMaisClicados}">
                    <div class="rank-number" th:text="${elemento.rank}">1</div>

                    <div class="bar-info">
                        <div class="bar-label-group">
                            <span class="bar-name" th:text="${elemento.nome}">Cursos Gratuitos</span>
                            <span class="bar-percent" th:text="${elemento.percentual + '%'}">94%</span>
                        </div>

                        <div class="bar-container">
                            <div class="bar-fill bg-muito-alto"
                                 th:style="'width: ' + ${elemento.percentual} + '%;'">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sub-card">
            <div class="card-header-group">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
                <h3>Insights de Comportamento</h3>
            </div>

            <div class="insight-box"
                 th:each="insight : ${insights}"
                 th:classappend="'insight-' + ${insight.tipo}">
                <strong th:text="${insight.titulo}">Título do insight</strong>
                <small th:text="${insight.descricao}">Descrição do insight</small>
            </div>
        </div>
    </div>
</div>

</body>
</html>
