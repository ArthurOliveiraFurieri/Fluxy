<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxy - Segmentação</title>

    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/segmentos.css}">
</head>

<body class="app-layout">

    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <div class="main-wrapper">

        <header th:replace="~{fragments/header :: header('Filtros e Segmentações', 'Configure segmentos avançados e compare comportamentos')}"></header>

        <main class="main-content">
            <div class="content-body">

                <!-- resto da página -->

                <section class="card table-section">
                    <div class="card-header-row">
                        <h3><i class="icon-chart"></i> Comparativo de Segmentos</h3>
                    </div>

                    <table class="comparison-table">
                        <thead>
                            <tr>
                                <th>SEGMENTO</th>
                                <th>PARTICIPAÇÃO</th>
                                <th>ENGAJAMENTO</th>
                                <th>RETENÇÃO</th>
                                <th>OPORTUNIDADE</th>
                            </tr>
                        </thead>

                        <tbody id="segmentosTableBody">
                        </tbody>

                    </table>
                </section>

            </div>
        </main>
    </div>

    <script src="/js/segmentos.js"></script>

</body>
</html>
