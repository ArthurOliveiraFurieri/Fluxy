<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<body>

<aside th:fragment="sidebar" class="sidebar">

    <!-- Logo -->
    <a th:href="@{/}" class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5">
            <polyline points="2,12 6,6 10,14 14,8 18,16 22,10"/>
        </svg>
    </a>

    <!-- Navegação principal -->
    <nav class="sidebar-nav">

        <a th:href="@{/}"
           th:classappend="${activePage == 'visao-geral'} ? 'active' : ''"
           class="sidebar-item"
           title="Visão Geral">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <span class="sidebar-label">Visão Geral</span>
        </a>

        <a th:href="@{/jornada}"
           th:classappend="${activePage == 'jornada'} ? 'active' : ''"
           class="sidebar-item"
           title="Jornada do Usuário">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="8,12 12,8 16,12"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
            </svg>
            <span class="sidebar-label">Jornada do Usuário</span>
        </a>

        <a th:href="@{/usuarios}"
           th:classappend="${activePage == 'usuarios'} ? 'active' : ''"
           class="sidebar-item"
           title="Usuários">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span class="sidebar-label">Usuários</span>
        </a>

        <a th:href="@{/metricas-engajamento}"
           th:classappend="${activePage == 'metricas-engajamento'} ? 'active' : ''"
           class="sidebar-item"
           title="Métricas de Engajamento">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6"  y1="20" x2="6"  y2="14"/>
            </svg>
            <span class="sidebar-label">Métricas</span>
        </a>

        <a th:href="@{/heatmap-e-comportamento}"
           th:classappend="${activePage == 'heatmap-e-comportamento'} ? 'active' : ''"
           class="sidebar-item"
           title="Engajamento">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                <path d="M12 2C8 7 4 9 4 13a8 8 0 0016 0c0-4-4-6-8-11z"/>
            </svg>
            <span class="sidebar-label">Engajamento</span>
        </a>

        <a th:href="@{/feedback-usuario}"
           th:classappend="${activePage == 'feedback-usuario'} ? 'active' : ''"
           class="sidebar-item"
           title="Feedback do Usuário">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <span class="sidebar-label">Feedback</span>
        </a>

        <a th:href="@{/configuracoes}"
           th:classappend="${activePage == 'configuracoes'} ? 'active' : ''"
           class="sidebar-item"
           title="Configurações">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
                <line x1="4"  y1="6"  x2="20" y2="6"/>
                <line x1="8"  y1="12" x2="20" y2="12"/>
                <line x1="12" y1="18" x2="20" y2="18"/>
            </svg>
            <span class="sidebar-label">Configurações</span>
        </a>

    </nav>

    <!-- Botão expandir -->
    <button class="sidebar-expand" id="sidebarToggle" title="Expandir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <polyline points="9,18 15,12 9,6"/>
        </svg>
    </button>

</aside>

</body>
</html>
